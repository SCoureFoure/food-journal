name: food_journal
description: Personal food & reaction journal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.22.0
  drift_flutter: ^0.2.4
  flutter_local_notifications: ^18.0.1
  flutter_timezone: ^5.0.2
  image_picker: ^1.1.2
  http: ^1.2.2
  flutter_dotenv: ^5.2.1
  share_plus: ^10.1.4
  intl: ^0.19.0
  path_provider: ^2.1.4
  timezone: ^0.10.0
  google_generative_ai: ^0.4.6
  shared_preferences: ^2.3.3
  file_picker: ^8.1.2
  liquid_progress_indicator_v2: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - .env
